# Sentinel Security Gate Template for GitLab CI
# This template ensures policy compliance before code is merged.

.sentinel-gate:
  stage: validate
  image: python:3.12-slim 
  
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    SENTINEL_AUTHORIZED_REPO: "$CI_PROJECT_PATH"

  cache:
    key: sentinel-pip-cache
    paths:
      - .cache/pip

  before_script:
    - apt-get update && apt-get install -y git
    - python -m pip install --upgrade pip
    - pip install git+https://x-access-token:${SENTINEL_INSTALL_TOKEN}@github.com/<YOUR_ORGANIZATION_OR_USERNAME>/<YOUR_PRIVATE_REPO_NAME>.git@main

  script:
    # Trigger security scan and generate audit report
    - sentinel scan . --report

  allow_failure: false
  
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

  artifacts:
    name: "sentinel-security-report-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - sentinel_report.html
    expire_in: 1 week